<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC App - Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">

  <header class="topbar" role="banner">
    <div class="topbar__left">
      <h1 id="chat-title" class="topbar__title">FC Chat</h1>
    </div>
    <div class="topbar__right">
      <a class="btn-quiet is-active" href="chat.html" aria-current="page">Chat</a>
      <button id="signout" class="btn-quiet" type="button">Sign out</button>
    </div>
  </header>

  <main class="chat">
    <section class="chat__panel" aria-label="Chat messages">
      <ol id="messages" class="chat__messages" aria-live="polite"></ol>
    </section>

    <form id="composer" class="chat__composer" autocomplete="off">
      <input
        id="message"
        type="text"
        inputmode="text"
        placeholder="Write a message..."
        maxlength="500"
        required
      >
      <button id="send" type="submit">Send</button>
    </form>
  </main>

  <script type="module" src="chat.js"></script>
</body>
</html>
