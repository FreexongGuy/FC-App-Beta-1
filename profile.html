<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC App - Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">

  <header class="topbar" role="banner">
    <div class="topbar__left">
      <h1 id="profile-title" class="topbar__title">Profile</h1>
    </div>
    <div class="topbar__right">
      <a class="btn-quiet" href="chat.html">Chat</a>
      <a class="btn-quiet" href="contacts.html">Contacts</a>
      <a class="btn-quiet" href="call.html">Call</a>
      <a class="btn-quiet" href="minigames.html">Minigames</a>
      <a class="btn-quiet" href="announcements.html">Announcements</a>
      <a class="btn-quiet" href="developerverification.html">Developer Panel</a>
      <a class="btn-quiet is-active" href="profile.html" aria-current="page">Profile</a>
      <button id="signout" class="btn-quiet" type="button">Sign out</button>
    </div>
  </header>

  <main class="auth">
    <div class="card">
      <div class="card__inner">
        <form id="profile-form">
          <h2>Profile picture</h2>

          <div class="profile-preview" aria-label="Profile picture preview">
            <div id="avatarPreview" class="profile-avatar">
              <span id="avatarFallback" class="avatar__fallback">?</span>
            </div>
            <p class="profile-hint">Upload an image to use as your avatar in chat.</p>
          </div>

          <label id="avatarLabel" for="avatarFile">Choose image</label>
          <input id="avatarFile" type="file" accept="image/*">

          <div id="uploadUi" class="upload-ui" hidden>
            <div class="upload-ui__row">
              <div id="uploadLabel" class="upload-ui__label">Preparing...</div>
              <div id="uploadPct" class="upload-ui__pct"></div>
            </div>
            <progress id="uploadProgress" class="upload-ui__bar" max="100"></progress>
          </div>

          <h2>About</h2>
          <label for="bio">Bio</label>
          <textarea id="bio" rows="4" maxlength="280" placeholder="Write a short bio..."></textarea>

          <label for="favorite">Favorite thing</label>
          <input id="favorite" type="text" maxlength="60" placeholder="What do you like most?">

          <button id="saveBtn" type="submit">Save</button>
          <p id="status"></p>

          <div class="divider"></div>

          <div class="profile-games__header">
            <h2>Your published games</h2>
            <a id="publishLink" class="btn-quiet btn-quiet--sm" href="publish.html">Publish a game</a>
          </div>
          <div id="gamesEmpty" class="game__meta" hidden>No published games yet.</div>
          <ol id="gamesList" class="profile-games" aria-label="Published games list"></ol>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
