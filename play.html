<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC App - Play</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page">

  <header class="topbar" role="banner">
    <div class="topbar__left">
      <h1 id="title" class="topbar__title">Play</h1>
    </div>
    <div class="topbar__right">
      <a class="btn-quiet" href="community.html">Back</a>
      <a class="btn-quiet" href="chat.html">Chat</a>
      <a class="btn-quiet" href="minigames.html">Minigames</a>
      <a class="btn-quiet" href="announcements.html">Announcements</a>
      <a class="btn-quiet" href="developerverification.html">Developer Panel</a>
      <a class="btn-quiet" href="profile.html">Profile</a>
      <button id="signout" class="btn-quiet" type="button">Sign out</button>
    </div>
  </header>

  <main class="hub">
    <section class="card hub__card" aria-label="Play game">
      <div class="card__inner">
        <div class="game__hud">
          <div>
            <div id="gameName" class="game__title">Loading…</div>
            <div id="gameMeta" class="game__meta"></div>
          </div>
          <div class="game__controls">
            <a id="ownerLink" class="btn-quiet btn-quiet--sm" href="profile.html">Owner</a>
            <a class="btn-quiet btn-quiet--sm" href="publish.html">Publish</a>
          </div>
        </div>

        <div class="iframe-wrap">
          <iframe id="frame" title="Published game" sandbox="allow-scripts"></iframe>
        </div>

        <p id="status"></p>
      </div>
    </section>
  </main>

  <script type="module" src="play.js"></script>
</body>
</html>
