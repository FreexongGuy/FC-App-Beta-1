<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC App - Ping Pong</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page">

  <header class="topbar" role="banner">
    <div class="topbar__left">
      <h1 class="topbar__title">Ping Pong</h1>
    </div>
    <div class="topbar__right">
      <a class="btn-quiet" href="gamesingle.html">Back</a>
      <a class="btn-quiet" href="chat.html">Chat</a>
      <a class="btn-quiet" href="minigames.html">Minigames</a>
      <a class="btn-quiet" href="announcements.html">Announcements</a>
      <a class="btn-quiet" href="developerverification.html">Developer Panel</a>
      <span class="topbar__label">Profile</span>
      <button id="signout" class="btn-quiet" type="button">Sign out</button>
    </div>
  </header>

  <main class="game">
    <section class="game__panel" aria-label="Ping Pong">
      <div class="game__inner">
        <div class="game__hud">
          <div>
            <div class="game__title">You vs Bot</div>
            <div class="game__meta">
              Move: <span class="kbd">Mouse</span> or <span class="kbd">↑</span><span class="kbd">↓</span>
            </div>
          </div>
          <div class="game__controls">
            <span id="ppScore" class="game__meta">0 - 0</span>
            <button id="ppStart" class="btn-quiet btn-quiet--sm" type="button">Serve</button>
            <button id="ppReset" class="btn-quiet btn-quiet--sm" type="button">Reset</button>
          </div>
        </div>

        <canvas id="ppCanvas" class="game-canvas" width="940" height="520" aria-label="Ping pong canvas"></canvas>
        <div id="ppStatus" class="game__meta"></div>
      </div>
    </section>
  </main>

  <script type="module" src="pingpong.js"></script>
</body>
</html>
