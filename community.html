<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC App - Community Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page">

  <header class="topbar" role="banner">
    <div class="topbar__left">
      <h1 class="topbar__title">Community Games</h1>
    </div>
    <div class="topbar__right">
      <a class="btn-quiet" href="minigames.html">Back</a>
      <a class="btn-quiet" href="chat.html">Chat</a>
      <a class="btn-quiet" href="minigames.html">Minigames</a>
      <a class="btn-quiet" href="announcements.html">Announcements</a>
      <a class="btn-quiet" href="developerverification.html">Developer Panel</a>
      <a class="btn-quiet" href="profile.html">Profile</a>
      <button id="signout" class="btn-quiet" type="button">Sign out</button>
    </div>
  </header>

  <main class="hub">
    <section class="card hub__card" aria-label="Community games list">
      <div class="card__inner">
        <div class="game__hud">
          <div>
            <div class="game__title">Browse</div>
            <div class="game__meta">Search by name, description, or owner.</div>
          </div>
          <div class="game__controls">
            <input id="search" type="search" placeholder="Search..." maxlength="60" />
            <a class="btn-quiet btn-quiet--sm" href="publish.html">Publish</a>
          </div>
        </div>

        <div id="empty" class="game__meta" hidden>No published games yet.</div>
        <ol id="list" class="game-list" aria-live="polite"></ol>
        <p id="status"></p>
      </div>
    </section>
  </main>

  <script type="module" src="community.js"></script>
</body>
</html>
