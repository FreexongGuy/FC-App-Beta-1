<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC App - 2D Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page">

  <header class="topbar" role="banner">
    <div class="topbar__left">
      <h1 id="title" class="topbar__title">2D Studio</h1>
    </div>
    <div class="topbar__right">
      <a class="btn-quiet" href="studio.html">Back</a>
      <a class="btn-quiet" href="minigames.html">Minigames</a>
      <a class="btn-quiet" href="community.html">Community</a>
      <a class="btn-quiet" href="publish.html">Code Publish</a>
      <a class="btn-quiet" href="chat.html">Chat</a>
      <a class="btn-quiet" href="profile.html">Profile</a>
      <button id="signout" class="btn-quiet" type="button">Sign out</button>
    </div>
  </header>

  <main class="studio">
    <section class="studio-panel" aria-label="Toolbar">
      <div class="studio-toolbar">
        <span class="badge">Tool: <span id="toolLabel">Select</span></span>
        <button id="toolSelect" class="btn-quiet btn-quiet--sm" type="button">Select</button>
        <button id="toolRect" class="btn-quiet btn-quiet--sm" type="button">Rectangle</button>
        <button id="toolCircle" class="btn-quiet btn-quiet--sm" type="button">Circle</button>
        <button id="toolSpawn" class="btn-quiet btn-quiet--sm" type="button">Player spawn</button>
        <button id="toolGoal" class="btn-quiet btn-quiet--sm" type="button">Goal</button>
        <button id="delObj" class="btn-quiet btn-quiet--sm btn-quiet--danger" type="button">Delete</button>
        <button id="playBtn" class="btn-quiet btn-quiet--sm" type="button">Play</button>
        <button id="stopBtn" class="btn-quiet btn-quiet--sm" type="button" disabled>Stop</button>
      </div>
      <p class="small-note">Click canvas to add objects. Drag to move. Scroll to zoom.</p>
    </section>

    <div class="studio-layout">
      <section class="studio-canvas-wrap" aria-label="2D canvas">
        <canvas id="c" class="studio-canvas" width="960" height="640"></canvas>
      </section>

      <section class="studio-panel" aria-label="Inspector">
        <h2 class="studio-section-title">Game</h2>
        <div class="kv">
          <div class="kv-row">
            <div class="kv-key">Name</div>
            <input id="gameName" type="text" maxlength="40" placeholder="My 2D game">
          </div>
          <div class="kv-row">
            <div class="kv-key">Desc</div>
            <input id="gameDesc" type="text" maxlength="200" placeholder="Short description">
          </div>
          <div class="kv-row">
            <div class="kv-key">Gravity</div>
            <input id="gravity" type="text" maxlength="10" placeholder="800">
          </div>
        </div>

        <div class="divider"></div>

        <h2 class="studio-section-title">Selected</h2>
        <div id="noSelection" class="game__meta">No object selected.</div>
        <div id="inspector" class="kv" hidden>
          <div class="kv-row">
            <div class="kv-key">Type</div>
            <input id="objType" type="text" disabled>
          </div>
          <div class="kv-row">
            <div class="kv-key">X</div>
            <input id="objX" type="text" maxlength="10">
          </div>
          <div class="kv-row">
            <div class="kv-key">Y</div>
            <input id="objY" type="text" maxlength="10">
          </div>
          <div class="kv-row">
            <div class="kv-key">W</div>
            <input id="objW" type="text" maxlength="10">
          </div>
          <div class="kv-row">
            <div class="kv-key">H</div>
            <input id="objH" type="text" maxlength="10">
          </div>
          <div class="kv-row">
            <div class="kv-key">Color</div>
            <input id="objColor" type="text" maxlength="16" placeholder="#ffffff">
          </div>
          <div class="kv-row">
            <div class="kv-key">Solid</div>
            <select id="objSolid" class="select">
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>
        </div>

        <div class="divider"></div>

        <div class="studio-footer">
          <button id="saveBtn" type="button">Save to this browser</button>
          <button id="publishBtn" type="button">Publish</button>
        </div>
        <p id="status"></p>
      </section>
    </div>
  </main>

  <script type="module" src="studio2d.js"></script>
</body>
</html>
