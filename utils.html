<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC App - Developer Utils</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">

  <header class="topbar" role="banner">
    <div class="topbar__left">
      <h1 id="utils-title" class="topbar__title">Developer Utils</h1>
    </div>
    <div class="topbar__right">
      <a class="btn-quiet" href="chat.html">Chat</a>
      <a class="btn-quiet" href="announcements.html">Announcements</a>
      <span class="topbar__label">Developer Panel</span>
      <a class="icon-btn topbar__icon" href="utilssettings.html" aria-label="Settings">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M19.4 13a7.9 7.9 0 0 0 .1-1 7.9 7.9 0 0 0-.1-1l2-1.6a.9.9 0 0 0 .2-1.1l-1.9-3.3a.9.9 0 0 0-1-.4l-2.3.9a7.8 7.8 0 0 0-1.7-1l-.3-2.4a.9.9 0 0 0-.9-.8H9.3a.9.9 0 0 0-.9.8l-.3 2.4a7.8 7.8 0 0 0-1.7 1l-2.3-.9a.9.9 0 0 0-1 .4L1.2 7.2a.9.9 0 0 0 .2 1.1l2 1.6a7.9 7.9 0 0 0-.1 1 7.9 7.9 0 0 0 .1 1l-2 1.6a.9.9 0 0 0-.2 1.1l1.9 3.3c.2.4.6.5 1 .4l2.3-.9c.5.4 1.1.7 1.7 1l.3 2.4c.1.5.4.8.9.8h3.4c.5 0 .8-.3.9-.8l.3-2.4c.6-.3 1.2-.6 1.7-1l2.3.9c.4.1.8 0 1-.4l1.9-3.3a.9.9 0 0 0-.2-1.1L19.4 13ZM11 15.5A3.5 3.5 0 1 1 11 8.5a3.5 3.5 0 0 1 0 7Z"/>
        </svg>
      </a>
      <button id="signout" class="btn-quiet" type="button">Sign out</button>
    </div>
  </header>

  <main class="admin">
    <section class="card admin__card" aria-label="Accounts">
      <div class="card__inner">
        <h2>Accounts</h2>
        <p class="admin__hint">All registered usernames (developer-only view).</p>
        <div class="table-wrap" role="region" aria-label="Accounts table" tabindex="0">
          <table class="admin-table">
            <thead>
              <tr>
                <th scope="col">Username</th>
                <th scope="col">Password</th>
                <th scope="col">Reveal</th>
                <th scope="col">Change</th>
                <th scope="col">Rename</th>
                <th scope="col">Remove</th>
              </tr>
            </thead>
            <tbody id="accounts-tbody"></tbody>
          </table>
        </div>
        <p id="accounts-status"></p>
      </div>
    </section>

    <section class="card admin__card" aria-label="Announcements admin">
      <div class="card__inner">
        <h2>Announcements</h2>
        <form id="announce-form" class="admin__form" autocomplete="off">
          <input id="announce-title" type="text" placeholder="Title (optional)" maxlength="80">
          <input id="announce-text" type="text" placeholder="Announcement text" maxlength="280" required>
          <button id="announce-send" type="submit">Post announcement</button>
          <p id="announce-status"></p>
        </form>

        <ol id="announce-list" class="admin__list" aria-live="polite"></ol>
      </div>
    </section>

    <section class="card admin__card" aria-label="Chat moderation">
      <div class="card__inner">
        <h2>Chat messages</h2>
        <div class="admin-actions">
          <button id="shutdown-chat" class="btn-quiet btn-quiet--danger" type="button">Shutdown chat</button>
          <button id="reopen-chat" class="btn-quiet" type="button">Reopen chat</button>
          <span id="shutdown-status" class="admin-actions__status"></span>
        </div>
        <p class="admin__hint">You can remove any message.</p>
        <ol id="admin-messages" class="admin__list" aria-live="polite"></ol>
      </div>
    </section>
  </main>

  <script type="module" src="utils.js"></script>
</body>
</html>
