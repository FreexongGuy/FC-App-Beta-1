<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC App - Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page">

  <header class="topbar" role="banner">
    <div class="topbar__left">
      <h1 class="topbar__title">Tic Tac Toe</h1>
    </div>
    <div class="topbar__right">
      <a class="btn-quiet" href="gamesingle.html">Back</a>
      <a class="btn-quiet" href="chat.html">Chat</a>
      <a class="btn-quiet" href="minigames.html">Minigames</a>
      <a class="btn-quiet" href="announcements.html">Announcements</a>
      <a class="btn-quiet" href="developerverification.html">Developer Panel</a>
      <a class="btn-quiet" href="profile.html">Profile</a>
      <button id="signout" class="btn-quiet" type="button">Sign out</button>
    </div>
  </header>

  <main class="game">
    <section class="game__panel" aria-label="Tic Tac Toe">
      <div class="game__inner">
        <div class="game__hud">
          <div>
            <div class="game__title">Play</div>
            <div id="tttStatus" class="game__meta">X goes first. Click a square.</div>
          </div>
          <div class="game__controls">
            <label class="inline-field">
              <span class="inline-field__label">Difficulty</span>
              <select id="tttDifficulty" class="select">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
              </select>
            </label>
            <button id="tttReset" class="btn-quiet btn-quiet--sm" type="button">Reset</button>
          </div>
        </div>

        <canvas id="tttCanvas" class="game-canvas" width="420" height="420" aria-label="Tic Tac Toe board"></canvas>
      </div>
    </section>
  </main>

  <script type="module" src="tictactoe.js"></script>
</body>
</html>
