<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC App - Call</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page">

  <header class="topbar" role="banner">
    <div class="topbar__left">
      <h1 id="callTitle" class="topbar__title">Call</h1>
    </div>
    <div class="topbar__right">
      <a class="btn-quiet" href="contacts.html">Contacts</a>
      <a class="btn-quiet" href="chat.html">Chat</a>
      <a class="btn-quiet" href="minigames.html">Minigames</a>
      <a class="btn-quiet" href="profile.html">Profile</a>
      <button id="signout" class="btn-quiet" type="button">Sign out</button>
    </div>
  </header>

  <main class="hub">
    <section class="card hub__card" aria-label="Call room">
      <div class="card__inner">
        <div class="game__hud">
          <div>
            <div class="game__title">Group call room</div>
            <div id="roomMeta" class="game__meta"></div>
          </div>
          <div class="game__controls">
            <button id="copyLink" class="btn-quiet btn-quiet--sm" type="button">Copy invite link</button>
            <button id="muteBtn" class="btn-quiet btn-quiet--sm" type="button">Mute</button>
            <button id="hangBtn" class="btn-quiet btn-quiet--sm btn-quiet--danger" type="button">Hang up</button>
          </div>
        </div>

        <div class="divider"></div>

        <h2 class="studio-section-title">Participants</h2>
        <ol id="peers" class="profile-games" aria-label="Participants list"></ol>
        <p id="status"></p>
      </div>
    </section>
  </main>

  <script type="module" src="call.js"></script>
</body>
</html>
