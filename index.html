<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC App - Sign Up / Login</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="firebase.js"></script>
</head>
<body class="page">

<header class="topbar" role="banner">
  <div class="topbar__left">
    <div class="topbar__title">FC App</div>
  </div>
  <div class="topbar__right">
    <a class="btn-quiet" href="chat.html">Chat</a>
    <a class="btn-quiet" href="minigames.html">Minigames</a>
    <a class="btn-quiet" href="profile.html">Profile</a>
    <a class="btn-quiet" href="announcements.html">Announcements</a>
    <a class="btn-quiet" href="developerverification.html">Developer Panel</a>
  </div>
</header>

<main class="auth">
  <div class="card">
    <div class="card__inner">
      <form id="signup-form">
        <h2>Create Account / Login</h2>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Sign Up</button>
        <p id="status"></p>
      </form>
    </div>
  </div>
</main>

<script type="module">
import { database, ref, set, get } from './firebase.js';

const form = document.getElementById('signup-form');
const status = document.getElementById('status');
const btn = form?.querySelector('button[type="submit"]');

function setStatus(msg, kind) {
  status.textContent = msg || "";
  status.style.color = kind === "error" ? "red" : "";
}

function safeGetItem(key) {
  try {
    return localStorage.getItem(key);
  } catch (e) {
    console.warn("localStorage blocked:", e);
    return null;
  }
}

function safeSetItem(key, value) {
  try {
    localStorage.setItem(key, value);
    return true;
  } catch (e) {
    console.warn("localStorage blocked:", e);
    return false;
  }
}

window.addEventListener("error", (e) => {
  setStatus("Error: " + (e?.message || "Unknown error"), "error");
});
window.addEventListener("unhandledrejection", (e) => {
  const reason = e?.reason;
  setStatus("Error: " + (reason?.message || String(reason || "Unknown error")), "error");
});

// Redirect if already logged in
if (safeGetItem('fcapp_user')) {
  window.location.href = 'chat.html';
}

form?.addEventListener('submit', async (e) => {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) return;

  // Firebase RTDB keys disallow: . # $ [ ] /
  if (username.length > 32 || /[.#$\[\]\/]/.test(username)) {
    setStatus("Username must be 1-32 chars and cannot contain . # $ [ ] /", "error");
    return;
  }

  setStatus("Working…", null);
  if (btn) btn.disabled = true;

  try {
    const userRef = ref(database, 'users/' + username);
    const snap = await get(userRef);

    if (snap.exists()) {
      const existing = snap.val() || {};
      if (existing.password !== password) {
        setStatus("Incorrect password for that username.", "error");
        return;
      }

      if (!safeSetItem('fcapp_user', username)) {
        setStatus("Login failed: browser storage is blocked (enable cookies/site data).", "error");
        return;
      }
      window.location.href = 'chat.html';
      return;
    }

    // Create new account in Firebase
    await set(userRef, { username, password });
    if (!safeSetItem('fcapp_user', username)) {
      setStatus("Account created, but browser storage is blocked (enable cookies/site data).", "error");
      return;
    }
    window.location.href = 'chat.html';
  } catch (error) {
    setStatus("Error: " + (error?.message || String(error)), "error");
  } finally {
    if (btn) btn.disabled = false;
  }
});
</script>

</body>
</html>
