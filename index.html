<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC App - Sign Up / Login</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="firebase.js"></script>
</head>
<body class="page">

<header class="topbar" role="banner">
  <div class="topbar__left">
    <div class="topbar__title">FC App</div>
  </div>
  <div class="topbar__right">
    <a class="btn-quiet" href="chat.html">Chat</a>
  </div>
</header>

<main class="auth">
  <div class="card">
    <div class="card__inner">
      <form id="signup-form">
        <h2>Create Account / Login</h2>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Sign Up</button>
        <p id="status"></p>
      </form>
    </div>
  </div>
</main>

<script type="module">
import { database, ref, set, get } from './firebase.js';

// Redirect if already logged in
if (localStorage.getItem('fcapp_user')) {
  window.location.href = 'chat.html';
}

const form = document.getElementById('signup-form');
const status = document.getElementById('status');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) return;

  status.textContent = "";
  status.style.color = "";

  try {
    const userRef = ref(database, 'users/' + username);
    const snap = await get(userRef);

    if (snap.exists()) {
      const existing = snap.val() || {};
      if (existing.password !== password) {
        status.textContent = "Incorrect password for that username.";
        status.style.color = "red";
        return;
      }

      localStorage.setItem('fcapp_user', username);
      window.location.href = 'chat.html';
      return;
    }

    // Create new account in Firebase
    await set(userRef, { username, password });
    localStorage.setItem('fcapp_user', username);
    window.location.href = 'chat.html';
  } catch (error) {
    status.textContent = "Error: " + (error?.message || String(error));
    status.style.color = "red";
  }
});
</script>

</body>
</html>
