<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FC App - Developer Verification</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">

  <header class="topbar" role="banner">
    <div class="topbar__left">
      <h1 class="topbar__title">Developer Panel</h1>
    </div>
    <div class="topbar__right">
      <a class="btn-quiet" href="chat.html">Chat</a>
      <a class="btn-quiet" href="minigames.html">Minigames</a>
      <a class="btn-quiet" href="announcements.html">Announcements</a>
      <a class="btn-quiet is-active" href="developerverification.html" aria-current="page">Developer Panel</a>
      <a class="btn-quiet" href="profile.html">Profile</a>
    </div>
  </header>

  <main class="auth">
    <div class="card">
      <div class="card__inner">
        <form id="dev-form" autocomplete="off">
          <h2>Enter panel password</h2>
          <input id="dev-pass" type="password" placeholder="Password" required>
          <button type="submit">Continue</button>
          <p id="status"></p>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="developerverification.js"></script>
</body>
</html>
